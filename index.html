<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Shooter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas { image-rendering: pixelated; image-rendering: crisp-edges; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

  <!-- Managers (must load before scenes that use them) -->
  <script src="src/managers/WaveManager.js"></script>
  <script src="src/managers/PowerUpManager.js"></script>

  <!-- Enemies -->
  <script src="src/enemies/Boss.js"></script>

  <!-- Scenes -->
  <script src="src/scenes/StartScene.js"></script>
  <script src="src/scenes/GameScene.js"></script>
  <script src="src/scenes/GameOverScene.js"></script>

  <!-- Boot -->
  <script src="src/main.js"></script>
</body>
</html>
